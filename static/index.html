<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
  <div class="max-w-6xl mx-auto px-4 py-10">
    <h1 class="text-3xl font-bold text-gray-800 mb-8 text-center">URL Tracker</h1>

    <div class="bg-white rounded-xl shadow-md p-6 mb-8">
      <h2 class="text-lg font-semibold text-gray-700 mb-4">Создать ссылку</h2>
      <div class="mb-4 p-3 bg-gray-50 rounded-lg">
        <span class="text-sm text-gray-500">Базовый URL:</span>
        <code class="text-sm text-blue-700 font-mono ml-2">https://web-production-2bf7f.up.railway.app</code>
      </div>
      <form id="createForm" class="flex flex-col gap-4 md:flex-row md:items-end">
        <div class="flex-1">
          <label class="block text-sm font-medium text-gray-600 mb-1">Название / Метка</label>
          <input type="text" id="label" required placeholder="Telegram канал"
            class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <button type="submit"
          class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-6 py-2 rounded-lg transition">
          Создать
        </button>
      </form>
      <p id="message" class="mt-4 text-sm hidden"></p>
    </div>

    <div class="bg-white rounded-xl shadow-md overflow-hidden">
      <div class="px-6 py-4 border-b border-gray-200">
        <h2 class="text-lg font-semibold text-gray-700">Все ссылки</h2>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead class="bg-gray-50">
            <tr>
              <th class="px-6 py-3 text-xs font-medium text-gray-500 uppercase tracking-wider">Название</th>
              <th class="px-6 py-3 text-xs font-medium text-gray-500 uppercase tracking-wider">Короткая ссылка</th>
              <th class="px-6 py-3 text-xs font-medium text-gray-500 uppercase tracking-wider">Целевая ссылка</th>
              <th class="px-6 py-3 text-xs font-medium text-gray-500 uppercase tracking-wider">Всего кликов</th>
              <th class="px-6 py-3 text-xs font-medium text-gray-500 uppercase tracking-wider">Уникальных</th>
              <th class="px-6 py-3 text-xs font-medium text-gray-500 uppercase tracking-wider text-right">Действия</th>
            </tr>
          </thead>
          <tbody id="linksTable" class="divide-y divide-gray-100">
            <tr>
              <td colspan="6" class="px-6 py-4 text-gray-400 text-center">Загрузка...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Stats Modal -->
  <div id="statsModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
    <div class="bg-white rounded-xl shadow-xl max-w-md w-full mx-4 p-6">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-lg font-bold text-gray-800">Статистика</h3>
        <button onclick="closeStats()" class="text-gray-400 hover:text-gray-600">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
      <div id="statsContent" class="space-y-4">
        <div class="flex justify-between border-b pb-2">
          <span class="text-gray-600">Всего кликов</span>
          <span id="statTotal" class="font-bold text-gray-800">0</span>
        </div>
        <div class="flex justify-between border-b pb-2">
          <span class="text-gray-600">Уникальных посетителей</span>
          <span id="statUnique" class="font-bold text-gray-800">0</span>
        </div>
        <div>
          <h4 class="text-sm font-semibold text-gray-700 mb-2">Устройства</h4>
          <div id="statDevices" class="space-y-1"></div>
        </div>
        <div>
          <h4 class="text-sm font-semibold text-gray-700 mb-2">Операционные системы</h4>
          <div id="statOs" class="space-y-1"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = '';

    async function loadLinks() {
      const res = await fetch(`${API_URL}/api/links`);
      const links = await res.json();
      const tbody = document.getElementById('linksTable');
      if (!links.length) {
        tbody.innerHTML = `<tr><td colspan="6" class="px-6 py-4 text-gray-400 text-center">Пока нет ссылок</td></tr>`;
        return;
      }
      tbody.innerHTML = links.map(link => {
        const shortUrl = `${window.location.origin}/${link.slug}`;
        return `<tr class="hover:bg-gray-50">
          <td class="px-6 py-4 text-sm text-gray-800 font-medium">${escapeHtml(link.label)}</td>
          <td class="px-6 py-4 text-sm">
            <a href="${shortUrl}" target="_blank" class="text-blue-600 hover:underline">${shortUrl}</a>
          </td>
          <td class="px-6 py-4 text-sm text-gray-600 truncate max-w-xs" title="${escapeHtml(link.target_url)}">
            <a href="${escapeHtml(link.target_url)}" target="_blank" class="hover:underline">${escapeHtml(link.target_url)}</a>
          </td>
          <td class="px-6 py-4 text-sm text-gray-800 font-semibold">${link.total_clicks}</td>
          <td class="px-6 py-4 text-sm text-gray-800 font-semibold">${link.unique_visitors}</td>
          <td class="px-6 py-4 text-sm text-right">
            <button onclick="showStats('${link.slug}')" title="Статистика"
              class="inline-flex items-center justify-center w-8 h-8 text-gray-400 hover:text-blue-600 hover:bg-blue-50 rounded-full transition mr-1"
              aria-label="Статистика">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 0 1 3 19.875v-6.75ZM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V8.625ZM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V4.125Z" />
              </svg>
            </button>
            <button onclick="resetClicks('${link.slug}')" title="Сбросить клики"
              class="inline-flex items-center justify-center w-8 h-8 text-gray-400 hover:text-red-600 hover:bg-red-50 rounded-full transition mr-1"
              aria-label="Сбросить клики">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
              </svg>
            </button>
            <button onclick="deleteLink('${link.slug}')" title="Удалить ссылку"
              class="inline-flex items-center justify-center w-8 h-8 text-gray-400 hover:text-red-700 hover:bg-red-100 rounded-full transition"
              aria-label="Удалить ссылку">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                <path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
              </svg>
            </button>
          </td>
        </tr>`;
      }).join('');
    }

    async function showStats(slug) {
      try {
        const res = await fetch(`${API_URL}/api/links/${slug}/stats`);
        if (!res.ok) throw new Error('Ошибка загрузки');
        const data = await res.json();
        document.getElementById('statTotal').textContent = data.total_clicks;
        document.getElementById('statUnique').textContent = data.unique_visitors;

        const devicesDiv = document.getElementById('statDevices');
        const deviceEntries = Object.entries(data.devices).sort((a, b) => b[1] - a[1]);
        devicesDiv.innerHTML = deviceEntries.length
          ? deviceEntries.map(([name, count]) => `
              <div class="flex justify-between text-sm">
                <span class="text-gray-600">${escapeHtml(name)}</span>
                <span class="font-medium text-gray-800">${count}</span>
              </div>`).join('')
          : '<div class="text-sm text-gray-400">Нет данных</div>';

        const osDiv = document.getElementById('statOs');
        const osEntries = Object.entries(data.os).sort((a, b) => b[1] - a[1]);
        osDiv.innerHTML = osEntries.length
          ? osEntries.map(([name, count]) => `
              <div class="flex justify-between text-sm">
                <span class="text-gray-600">${escapeHtml(name)}</span>
                <span class="font-medium text-gray-800">${count}</span>
              </div>`).join('')
          : '<div class="text-sm text-gray-400">Нет данных</div>';

        const modal = document.getElementById('statsModal');
        modal.classList.remove('hidden');
        modal.classList.add('flex');
      } catch (err) {
        alert('Не удалось загрузить статистику');
      }
    }

    function closeStats() {
      const modal = document.getElementById('statsModal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    }

    async function resetClicks(slug) {
      if (!confirm('Сбросить счетчик кликов до 0?')) return;
      try {
        const res = await fetch(`${API_URL}/api/links/${slug}/reset`, { method: 'POST' });
        if (!res.ok) throw new Error('Ошибка сброса');
        loadLinks();
      } catch (err) {
        alert('Не удалось сбросить клики');
      }
    }

    async function deleteLink(slug) {
      if (!confirm('Удалить эту ссылку?')) return;
      try {
        const res = await fetch(`${API_URL}/api/links/${slug}`, { method: 'DELETE' });
        if (!res.ok) throw new Error('Ошибка удаления');
        loadLinks();
      } catch (err) {
        alert('Не удалось удалить ссылку');
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    document.getElementById('createForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const label = document.getElementById('label').value;
      const msg = document.getElementById('message');
      try {
        const res = await fetch(`${API_URL}/api/links`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ label })
        });
        if (!res.ok) throw new Error('Ошибка создания');
        const data = await res.json();
        const shortUrl = `${window.location.origin}/${data.slug}`;
        msg.className = 'mt-4 text-sm text-green-700';
        msg.textContent = `Ссылка создана: ${shortUrl}`;
        msg.classList.remove('hidden');
        document.getElementById('createForm').reset();
        loadLinks();
      } catch (err) {
        msg.className = 'mt-4 text-sm text-red-600';
        msg.textContent = 'Не удалось создать ссылку';
        msg.classList.remove('hidden');
      }
    });

    document.getElementById('statsModal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('statsModal')) closeStats();
    });

    loadLinks();
  </script>
</body>
</html>
